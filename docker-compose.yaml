version: '3.7'

services:
  db:
    container_name: postgres_linguaai
    image: postgres:16.9
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - 5434:5432
    volumes:
      - postgres_linguaai_data:/var/lib/postgresql/data
    networks:
      - backend_linguaai

  

volumes:
  postgres_linguaai_data:
  # redis_data:

networks:
  backend_linguaai:
    driver: bridge
